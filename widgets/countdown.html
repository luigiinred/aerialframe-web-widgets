<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }
  .container {
    text-align: center;
    color: var(--color);
    text-shadow:
      -1px 0 0 rgba(0,0,0,0.6),
      1px 0 0 rgba(0,0,0,0.6),
      0 -1px 0 rgba(0,0,0,0.6),
      0 1px 0 rgba(0,0,0,0.6),
      1px 2px 4px rgba(0,0,0,0.35);
    width: 100%;
  }
  .title {
    font-size: min(2.5vw, 3vh, 1.4rem);
    font-weight: 500;
    opacity: 0.7;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3em;
    white-space: nowrap;
  }
  .countdown {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: min(2vw, 2vh, 1.5rem);
  }
  .unit {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .value {
    font-size: min(14vw, 16vh, 6rem);
    font-weight: 100;
    line-height: 1;
    letter-spacing: -0.03em;
    font-variant-numeric: tabular-nums;
  }
  .label {
    font-size: min(1.8vw, 2vh, 0.8rem);
    font-weight: 500;
    opacity: 0.5;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 0.2em;
  }
  .separator {
    font-size: min(8vw, 10vh, 4rem);
    font-weight: 100;
    opacity: 0.2;
    line-height: 1;
  }
  .complete {
    font-size: min(10vw, 12vh, 3rem);
    font-weight: 300;
    opacity: 0.9;
  }
</style>
</head>
<body>
<div class="container">
  <div class="title" id="title"></div>
  <div id="countdown-area"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const targetDate = params.get('date') || '2025-12-31T00:00:00';
  const title = params.get('title') || '';
  const color = params.get('color') || '#ffffff';

  document.documentElement.style.setProperty('--color', color);

  const titleEl = document.getElementById('title');
  titleEl.textContent = title;
  if (!title) titleEl.style.display = 'none';

  const target = new Date(targetDate).getTime();

  function update() {
    const now = Date.now();
    const diff = target - now;
    const area = document.getElementById('countdown-area');

    if (diff <= 0) {
      area.innerHTML = '<div class="complete">🎉</div>';
      return;
    }

    const days = Math.floor(diff / 86400000);
    const hours = Math.floor((diff % 86400000) / 3600000);
    const mins = Math.floor((diff % 3600000) / 60000);
    const secs = Math.floor((diff % 60000) / 1000);

    let html = '<div class="countdown">';
    if (days > 0) {
      html += `<div class="unit"><div class="value">${days}</div><div class="label">Day${days !== 1 ? 's' : ''}</div></div>`;
      html += '<div class="separator">:</div>';
    }
    html += `<div class="unit"><div class="value">${String(hours).padStart(2,'0')}</div><div class="label">Hr</div></div>`;
    html += '<div class="separator">:</div>';
    html += `<div class="unit"><div class="value">${String(mins).padStart(2,'0')}</div><div class="label">Min</div></div>`;
    html += '<div class="separator">:</div>';
    html += `<div class="unit"><div class="value">${String(secs).padStart(2,'0')}</div><div class="label">Sec</div></div>`;
    html += '</div>';
    area.innerHTML = html;
  }

  update();
  setInterval(update, 1000);
</script>
</body>
</html>
