<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Inspirational Quotes</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: 'Georgia', 'Times New Roman', serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
  }
  .quote-container {
    text-align: center;
    color: var(--color);
    text-shadow: 0 1px 10px rgba(0,0,0,0.5);
    opacity: 0;
    transition: opacity 1.5s ease;
    width: 100%;
  }
  .quote-container.visible { opacity: 1; }
  .quote-mark {
    font-size: min(8vw, 8vh, 5rem);
    opacity: 0.2;
    line-height: 0.5;
    font-family: Georgia, serif;
  }
  .quote-text {
    font-size: min(3.5vw, 5vh, 2rem);
    font-weight: 400;
    line-height: 1.5;
    font-style: italic;
    margin: 0.5em 0;
    letter-spacing: 0.01em;
  }
  .quote-author {
    font-size: min(2vw, 2.5vh, 1rem);
    font-weight: 400;
    opacity: 0.6;
    font-style: normal;
    font-family: -apple-system, 'SF Pro Display', sans-serif;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 1em;
  }
  .quote-author::before {
    content: '— ';
  }
  .divider {
    width: 40px;
    height: 1px;
    background: var(--color);
    opacity: 0.3;
    margin: 1em auto 0;
  }
</style>
</head>
<body>
<div class="quote-container" id="container">
  <div class="quote-mark">"</div>
  <div class="quote-text" id="quote"></div>
  <div class="divider"></div>
  <div class="quote-author" id="author"></div>
</div>
<script>
  const quotes = [
    { text: "The only way to do great work is to love what you do.", author: "Steve Jobs" },
    { text: "In the middle of difficulty lies opportunity.", author: "Albert Einstein" },
    { text: "Simplicity is the ultimate sophistication.", author: "Leonardo da Vinci" },
    { text: "The best time to plant a tree was 20 years ago. The second best time is now.", author: "Chinese Proverb" },
    { text: "Everything you can imagine is real.", author: "Pablo Picasso" },
    { text: "Be yourself; everyone else is already taken.", author: "Oscar Wilde" },
    { text: "The only impossible journey is the one you never begin.", author: "Tony Robbins" },
    { text: "What we think, we become.", author: "Buddha" },
    { text: "Turn your wounds into wisdom.", author: "Oprah Winfrey" },
    { text: "Not all those who wander are lost.", author: "J.R.R. Tolkien" },
    { text: "Life is what happens when you're busy making other plans.", author: "John Lennon" },
    { text: "The purpose of our lives is to be happy.", author: "Dalai Lama" },
    { text: "Stay hungry, stay foolish.", author: "Steve Jobs" },
    { text: "The unexamined life is not worth living.", author: "Socrates" },
    { text: "Creativity is intelligence having fun.", author: "Albert Einstein" },
    { text: "Do what you can, with what you have, where you are.", author: "Theodore Roosevelt" },
    { text: "The future belongs to those who believe in the beauty of their dreams.", author: "Eleanor Roosevelt" },
    { text: "It does not do to dwell on dreams and forget to live.", author: "J.K. Rowling" },
    { text: "In three words I can sum up everything I've learned about life: it goes on.", author: "Robert Frost" },
    { text: "To live is the rarest thing in the world. Most people exist, that is all.", author: "Oscar Wilde" },
    { text: "The only limit to our realization of tomorrow is our doubts of today.", author: "Franklin D. Roosevelt" },
    { text: "Life is really simple, but we insist on making it complicated.", author: "Confucius" },
    { text: "You miss 100% of the shots you don't take.", author: "Wayne Gretzky" },
    { text: "Happiness is not something ready-made. It comes from your own actions.", author: "Dalai Lama" },
    { text: "The mind is everything. What you think you become.", author: "Buddha" },
  ];

  const params = new URLSearchParams(window.location.search);
  const color = params.get('color') || '#ffffff';
  const interval = parseInt(params.get('interval') || '30') * 1000;

  document.documentElement.style.setProperty('--color', color);

  const container = document.getElementById('container');
  const quoteEl = document.getElementById('quote');
  const authorEl = document.getElementById('author');
  let currentIndex = Math.floor(Math.random() * quotes.length);

  function showQuote() {
    container.classList.remove('visible');
    setTimeout(() => {
      const q = quotes[currentIndex];
      quoteEl.textContent = q.text;
      authorEl.textContent = q.author;
      container.classList.add('visible');
      currentIndex = (currentIndex + 1) % quotes.length;
    }, 1500);
  }

  for (let i = quotes.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quotes[i], quotes[j]] = [quotes[j], quotes[i]];
  }

  showQuote();
  setInterval(showQuote, interval);
</script>
</body>
</html>
