<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>People in Space</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
  }
  .container {
    color: var(--color);
    text-shadow:
      -1px 0 0 rgba(0,0,0,0.6),
      1px 0 0 rgba(0,0,0,0.6),
      0 -1px 0 rgba(0,0,0,0.6),
      0 1px 0 rgba(0,0,0,0.6),
      1px 2px 4px rgba(0,0,0,0.35);
    width: 100%;
  }
  .header {
    text-align: center;
    margin-bottom: 0.8em;
  }
  .count {
    font-size: min(12vw, 14vh, 5rem);
    font-weight: 100;
    line-height: 1;
  }
  .count-label {
    font-size: min(2vw, 2.5vh, 0.8rem);
    font-weight: 500;
    opacity: 0.5;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-top: 0.3em;
  }
  .craft-group {
    margin-top: 0.6em;
  }
  .craft-name {
    font-size: min(1.5vw, 2vh, 0.65rem);
    font-weight: 600;
    opacity: 0.4;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 0.3em;
  }
  .people {
    display: flex;
    flex-wrap: wrap;
    gap: 0.2em 0.8em;
  }
  .person {
    font-size: min(2.2vw, 2.8vh, 0.9rem);
    font-weight: 300;
    white-space: nowrap;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="count" id="count">—</div>
    <div class="count-label">People in Space Right Now</div>
  </div>
  <div id="groups"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const color = params.get('color') || '#ffffff';
  document.documentElement.style.setProperty('--color', color);

  async function update() {
    try {
      const res = await fetch('http://api.open-notify.org/astros.json');
      const data = await res.json();

      document.getElementById('count').textContent = data.number;

      const byCraft = {};
      data.people.forEach(p => {
        if (!byCraft[p.craft]) byCraft[p.craft] = [];
        byCraft[p.craft].push(p.name);
      });

      const groupsEl = document.getElementById('groups');
      groupsEl.innerHTML = '';

      Object.entries(byCraft).forEach(([craft, people]) => {
        const div = document.createElement('div');
        div.className = 'craft-group';
        div.innerHTML = `
          <div class="craft-name">${craft}</div>
          <div class="people">
            ${people.map(n => `<span class="person">${n}</span>`).join('')}
          </div>
        `;
        groupsEl.appendChild(div);
      });
    } catch {
      document.getElementById('count').textContent = '?';
    }
  }

  update();
  setInterval(update, 300000);
</script>
</body>
</html>
