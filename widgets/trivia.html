<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trivia</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
  }
  .container {
    text-align: center;
    color: var(--color);
    text-shadow:
      -1px 0 0 rgba(0,0,0,0.6),
      1px 0 0 rgba(0,0,0,0.6),
      0 -1px 0 rgba(0,0,0,0.6),
      0 1px 0 rgba(0,0,0,0.6),
      1px 2px 4px rgba(0,0,0,0.35);
    width: 100%;
    opacity: 0;
    transition: opacity 1s ease;
  }
  .container.visible { opacity: 1; }
  .category {
    font-size: min(1.5vw, 2vh, 0.65rem);
    font-weight: 600;
    opacity: 0.4;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 1em;
  }
  .question {
    font-size: min(3.5vw, 4.5vh, 1.6rem);
    font-weight: 500;
    line-height: 1.4;
    margin-bottom: 0.8em;
  }
  .divider {
    width: 40px;
    height: 1px;
    background: var(--color);
    opacity: 0.2;
    margin: 0 auto;
  }
  .answer {
    font-size: min(3.5vw, 4.5vh, 1.6rem);
    font-weight: 600;
    margin-top: 0.8em;
    opacity: 0;
    transition: opacity 1.5s ease;
    color: var(--accent);
  }
  .answer.visible { opacity: 1; }
  .difficulty {
    font-size: min(1.2vw, 1.5vh, 0.55rem);
    opacity: 0.25;
    margin-top: 1em;
    text-transform: capitalize;
  }
</style>
</head>
<body>
<div class="container" id="container">
  <div class="category" id="category"></div>
  <div class="question" id="question"></div>
  <div class="divider"></div>
  <div class="answer" id="answer"></div>
  <div class="difficulty" id="difficulty"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const color = params.get('color') || '#ffffff';
  const accent = params.get('accent') || '#81c784';
  const interval = parseInt(params.get('interval') || '30') * 1000;
  const reveal = parseInt(params.get('reveal') || '5') * 1000;
  const categoryId = params.get('category') || '';

  document.documentElement.style.setProperty('--color', color);
  document.documentElement.style.setProperty('--accent', accent);

  const container = document.getElementById('container');

  function decode(html) {
    const el = document.createElement('textarea');
    el.innerHTML = html;
    return el.value;
  }

  const fallbacks = [
    { category: 'Science', question: 'What is the chemical symbol for gold?', answer: 'Au', difficulty: 'easy' },
    { category: 'Geography', question: 'What is the smallest country in the world?', answer: 'Vatican City', difficulty: 'easy' },
    { category: 'History', question: 'In what year did the Berlin Wall fall?', answer: '1989', difficulty: 'medium' },
    { category: 'Science', question: 'How many bones are in the adult human body?', answer: '206', difficulty: 'medium' },
    { category: 'Geography', question: 'What is the longest river in the world?', answer: 'The Nile', difficulty: 'easy' },
  ];

  async function fetchTrivia() {
    try {
      let url = 'https://opentdb.com/api.php?amount=1&type=multiple';
      if (categoryId) url += `&category=${categoryId}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();
      if (!data.results || !data.results.length) throw new Error();
      const q = data.results[0];
      return {
        category: decode(q.category),
        question: decode(q.question),
        answer: decode(q.correct_answer),
        difficulty: q.difficulty,
      };
    } catch {
      return fallbacks[Math.floor(Math.random() * fallbacks.length)];
    }
  }

  async function show() {
    container.classList.remove('visible');
    document.getElementById('answer').classList.remove('visible');

    await new Promise(r => setTimeout(r, 1000));
    const t = await fetchTrivia();

    document.getElementById('category').textContent = t.category;
    document.getElementById('question').textContent = t.question;
    document.getElementById('answer').textContent = t.answer;
    document.getElementById('difficulty').textContent = t.difficulty;

    container.classList.add('visible');
    setTimeout(() => {
      document.getElementById('answer').classList.add('visible');
    }, reveal);
  }

  show();
  setInterval(show, interval);
</script>
</body>
</html>
