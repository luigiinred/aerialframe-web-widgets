<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker News</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
  }
  .container {
    color: var(--color);
    text-shadow:
      -1px 0 0 rgba(0,0,0,0.6),
      1px 0 0 rgba(0,0,0,0.6),
      0 -1px 0 rgba(0,0,0,0.6),
      0 1px 0 rgba(0,0,0,0.6),
      1px 2px 4px rgba(0,0,0,0.35);
    width: 100%;
  }
  .label {
    font-size: min(1.5vw, 2vh, 0.65rem);
    font-weight: 600;
    opacity: 0.4;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 0.8em;
    text-align: center;
  }
  .label span { color: var(--accent); }
  .stories {
    display: flex;
    flex-direction: column;
    gap: min(1.5vh, 0.6rem);
  }
  .story {
    display: flex;
    gap: 0.6em;
    align-items: baseline;
    opacity: 0;
    transition: opacity 0.8s ease;
  }
  .story.visible { opacity: 1; }
  .rank {
    font-size: min(2vw, 2.5vh, 0.75rem);
    font-weight: 600;
    opacity: 0.3;
    font-variant-numeric: tabular-nums;
    flex-shrink: 0;
    min-width: 1.5em;
    text-align: right;
  }
  .story-title {
    font-size: min(2.5vw, 3vh, 1rem);
    font-weight: 400;
    line-height: 1.35;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .story-meta {
    font-size: min(1.5vw, 1.8vh, 0.6rem);
    opacity: 0.3;
    margin-top: 0.15em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="label"><span>Y</span> Hacker News</div>
  <div class="stories" id="stories"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const color = params.get('color') || '#ffffff';
  const accent = params.get('accent') || '#ff6600';
  const count = parseInt(params.get('count') || '5');
  const feed = params.get('feed') || 'top';

  document.documentElement.style.setProperty('--color', color);
  document.documentElement.style.setProperty('--accent', accent);

  const HN = 'https://hacker-news.firebaseio.com/v0';
  const feedMap = { top: 'topstories', new: 'newstories', best: 'beststories' };
  const endpoint = feedMap[feed] || 'topstories';

  function timeAgo(unix) {
    const diff = Math.floor(Date.now() / 1000) - unix;
    if (diff < 3600) return `${Math.floor(diff / 60)}m`;
    if (diff < 86400) return `${Math.floor(diff / 3600)}h`;
    return `${Math.floor(diff / 86400)}d`;
  }

  async function load() {
    try {
      const res = await fetch(`${HN}/${endpoint}.json`);
      const ids = (await res.json()).slice(0, count);

      const stories = await Promise.all(
        ids.map(id => fetch(`${HN}/item/${id}.json`).then(r => r.json()))
      );

      const container = document.getElementById('stories');
      container.innerHTML = '';

      stories.forEach((s, i) => {
        const div = document.createElement('div');
        div.className = 'story';
        div.innerHTML = `
          <div class="rank">${i + 1}</div>
          <div>
            <div class="story-title">${s.title || ''}</div>
            <div class="story-meta">${s.score || 0} pts · ${timeAgo(s.time)}</div>
          </div>
        `;
        container.appendChild(div);
        setTimeout(() => div.classList.add('visible'), 150 * (i + 1));
      });
    } catch {
      document.getElementById('stories').innerHTML =
        '<div class="story visible"><div class="story-title" style="opacity:0.4">Could not load stories</div></div>';
    }
  }

  load();
  setInterval(load, 300000);
</script>
</body>
</html>
