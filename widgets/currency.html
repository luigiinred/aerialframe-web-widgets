<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Currency Exchange</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: transparent;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 6px;
  }
  .container {
    color: var(--color);
    text-shadow:
      -1px 0 0 rgba(0,0,0,0.6),
      1px 0 0 rgba(0,0,0,0.6),
      0 -1px 0 rgba(0,0,0,0.6),
      0 1px 0 rgba(0,0,0,0.6),
      1px 2px 4px rgba(0,0,0,0.35);
    width: 100%;
  }
  .header {
    text-align: center;
    margin-bottom: 0.6em;
  }
  .base {
    font-size: min(1.5vw, 2vh, 0.65rem);
    font-weight: 600;
    opacity: 0.4;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .rates {
    display: flex;
    flex-direction: column;
    gap: min(1.5vh, 0.5rem);
  }
  .rate-row {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    padding: 0.25em 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .rate-row:last-child { border-bottom: none; }
  .currency-code {
    font-size: min(2.5vw, 3vh, 1rem);
    font-weight: 500;
    letter-spacing: 0.05em;
    min-width: 3em;
  }
  .currency-flag {
    font-size: min(3vw, 3.5vh, 1.2rem);
    text-shadow: none;
    margin-right: 0.3em;
  }
  .rate-value {
    font-size: min(3.5vw, 4vh, 1.3rem);
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
  }
  .updated {
    text-align: center;
    font-size: min(1.2vw, 1.5vh, 0.55rem);
    opacity: 0.2;
    margin-top: 0.8em;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="base" id="base-label"></div>
  </div>
  <div class="rates" id="rates"></div>
  <div class="updated" id="updated"></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const color = params.get('color') || '#ffffff';
  const base = params.get('base') || 'USD';
  const symbols = params.get('symbols') || 'EUR,GBP,JPY,CAD';

  document.documentElement.style.setProperty('--color', color);
  document.getElementById('base-label').textContent = `1 ${base} =`;

  const flags = {
    USD:'馃嚭馃嚫',EUR:'馃嚜馃嚭',GBP:'馃嚞馃嚙',JPY:'馃嚡馃嚨',CAD:'馃嚚馃嚘',AUD:'馃嚘馃嚭',
    CHF:'馃嚚馃嚟',CNY:'馃嚚馃嚦',INR:'馃嚠馃嚦',MXN:'馃嚥馃嚱',BRL:'馃嚙馃嚪',KRW:'馃嚢馃嚪',
    SEK:'馃嚫馃嚜',NOK:'馃嚦馃嚧',DKK:'馃嚛馃嚢',NZD:'馃嚦馃嚳',SGD:'馃嚫馃嚞',HKD:'馃嚟馃嚢',
    TRY:'馃嚬馃嚪',ZAR:'馃嚳馃嚘',PLN:'馃嚨馃嚤',THB:'馃嚬馃嚟',PHP:'馃嚨馃嚟',IDR:'馃嚠馃嚛',
    CZK:'馃嚚馃嚳',HUF:'馃嚟馃嚭',ILS:'馃嚠馃嚤',ISK:'馃嚠馃嚫',BGN:'馃嚙馃嚞',RON:'馃嚪馃嚧',
  };

  async function load() {
    try {
      const res = await fetch(
        `https://api.frankfurter.dev/v1/latest?base=${base}&symbols=${symbols}`
      );
      if (!res.ok) throw new Error();
      const data = await res.json();

      const container = document.getElementById('rates');
      container.innerHTML = '';

      Object.entries(data.rates).forEach(([code, rate]) => {
        const div = document.createElement('div');
        div.className = 'rate-row';
        const decimals = rate >= 100 ? 1 : rate >= 10 ? 2 : 4;
        div.innerHTML = `
          <div>
            <span class="currency-flag">${flags[code] || ''}</span>
            <span class="currency-code">${code}</span>
          </div>
          <div class="rate-value">${rate.toFixed(decimals)}</div>
        `;
        container.appendChild(div);
      });

      document.getElementById('updated').textContent = `Updated ${data.date}`;
    } catch {
      document.getElementById('rates').innerHTML =
        '<div class="rate-row"><div class="currency-code" style="opacity:0.4">Could not load rates</div></div>';
    }
  }

  load();
  setInterval(load, 3600000);
</script>
</body>
</html>
